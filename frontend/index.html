<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="DocuMind AI — Upload any PDF or image and get instant AI-powered summaries, sentiment analysis, and actionable insights."/>
  <meta name="theme-color" content="#080808"/>
  <title>DocuMind AI — Intelligent Document Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100%}
    body{
      background:#080808;
      color:#f4f4f5;
      font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      -webkit-font-smoothing:antialiased;
      line-height:1.6;
    }
    code,kbd,pre{font-family:'JetBrains Mono',ui-monospace,monospace}
    .skip-nav{
      position:fixed;top:-100%;left:16px;z-index:9999;
      padding:8px 18px;background:#14b8a6;color:#fff;
      font-weight:700;border-radius:0 0 8px 8px;
      text-decoration:none;font-size:14px;transition:top .15s
    }
    .skip-nav:focus{top:0}
    :focus-visible{outline:2px solid #14b8a6;outline-offset:3px;border-radius:4px}
    button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(20,184,166,.4);border-radius:99px}

    /* Mesh gradient background for hero */
    .mesh-bg{
      position:absolute;inset:0;overflow:hidden;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%,rgba(13,148,136,.12) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%,rgba(6,182,212,.08) 0%,transparent 60%),
        radial-gradient(ellipse 50% 30% at 60% 10%,rgba(129,140,248,.06) 0%,transparent 60%);
    }

    @keyframes spin       {to{transform:rotate(360deg)}}
    @keyframes slide-prog {0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
    @keyframes fade-up    {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse-dim  {0%,100%{opacity:.3}50%{opacity:.6}}
    @keyframes float      {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  </style>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DocuMind AI — Upload any PDF or image and get instant AI-powered summaries, sentiment analysis, and actionable insights." />
    <meta name="theme-color" content="#080c18" />
    <title>DocuMind AI — Intelligent Document Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      html, body, #root { min-height: 100%; }

      body {
        background: #080c18;
        color: #e2e8f0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
      }

      code, kbd, pre, .mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }

      /* Skip nav */
      .skip-nav {
        position: fixed; top: -100%; left: 16px; z-index: 9999;
        padding: 8px 18px; background: #4f46e5; color: #fff;
        font-weight: 700; border-radius: 0 0 8px 8px;
        text-decoration: none; font-size: 14px; transition: top .15s;
      }
      .skip-nav:focus { top: 0; }

      /* Global focus */
      :focus-visible { outline: 2px solid #6366f1; outline-offset: 3px; border-radius: 4px; }
      button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }

      /* Screen reader only */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.4); border-radius: 99px; }

      /* Grid utilities */
      .analysis-layout { display: grid; gap: 16px; }
      @media (min-width: 900px) { .analysis-layout { grid-template-columns: 1fr 320px; } }

      /* Keyframes */
      @keyframes spin         { to { transform: rotate(360deg); } }
      @keyframes slide-prog   { 0% { transform:translateX(-100%); } 100% { transform:translateX(250%); } }
      @keyframes fade-up      { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse-dim    { 0%,100% { opacity:.4; } 50% { opacity:.75; } }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

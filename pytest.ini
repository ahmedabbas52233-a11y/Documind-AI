[pytest]
asyncio_mode = auto
testpaths = app/tests

filterwarnings =
    # passlib imports the deprecated 'crypt' module on Python 3.12 — not our code
    ignore::DeprecationWarning:passlib
    # Pydantic v2: class-based Config is deprecated — suppress until schemas are migrated
    ignore::pydantic.PydanticDeprecatedSince20
    # Broad catch for any remaining passlib crypt warnings
    ignore:.*crypt.*:DeprecationWarning